name: Build macOS

on:
  workflow_call:
    inputs:
      llama_cpp_version:
        required: false
        type: string
        default: "master"
      genai_version:
        required: false
        type: string
        default: "0.12.2"
      ort_version:
        required: false
        type: string
        default: "1.25.0-dev-20260125-1205-727db0d3dc"

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download miniaudio.h
        run: |
          curl -sL -o include/miniaudio.h https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h

      - name: Clone llama.cpp
        run: |
          git clone --depth 1 --branch ${{ inputs.llama_cpp_version }} https://github.com/ggml-org/llama.cpp.git llama_cpp_src

      - name: Build llama.cpp
        run: |
          cd llama_cpp_src
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DGGML_VULKAN=OFF \
            -DGGML_METAL=ON \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_TOOLS=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF
          cmake --build build --config Release --parallel
          echo "LLAMA_CPP_PATH=${{ github.workspace }}/llama_cpp_src" >> $GITHUB_ENV

      - name: Download onnxruntime-genai (prebuilt)
        run: |
          GENAI_VERSION="${{ inputs.genai_version }}"
          mkdir -p genai_extracted
          curl -sL "https://github.com/microsoft/onnxruntime-genai/releases/download/v${GENAI_VERSION}/onnxruntime-genai-${GENAI_VERSION}-osx-arm64.tar.gz" \
            | tar xz -C genai_extracted

          GENAI_ROOT=""
          for candidate in genai_extracted genai_extracted/*; do
            if [ -d "$candidate/include" ] && [ -d "$candidate/lib" ]; then
              GENAI_ROOT="$candidate"
              break
            fi
          done

          if [ -z "$GENAI_ROOT" ]; then
            echo "Could not locate onnxruntime-genai root in genai_extracted"
            exit 1
          fi

          echo "ORT_GENAI_PATH=${{ github.workspace }}/${GENAI_ROOT}" >> $GITHUB_ENV

      - name: Download ONNX Runtime (matching)
        run: |
          ORT_VERSION="${{ inputs.ort_version }}"
          ORT_URL="https://pkgs.dev.azure.com/aiinfra/2692857e-05ef-43b4-ba9c-ccf1c22c437c/_apis/packaging/feeds/7982ae20-ed19-4a35-a362-a96ac99897b7/nuget/packages/Microsoft.ML.OnnxRuntime/versions/${ORT_VERSION}/content?api-version=6.0-preview.1"
          curl -sL "$ORT_URL" -o ort.nupkg
          mkdir -p ort_pkg
          unzip -q ort.nupkg -d ort_pkg
          rm -f ort.nupkg

          if [ -z "${ORT_GENAI_PATH:-}" ]; then
            echo "ORT_GENAI_PATH is not set"
            exit 1
          fi

          if [ ! -d ort_pkg/build/native/include ]; then
            echo "Cannot find ORT include directory"
            exit 1
          fi
          cp -R ort_pkg/build/native/include/* "${ORT_GENAI_PATH}/include/"

          if [ ! -f ort_pkg/runtimes/osx-arm64/native/libonnxruntime.dylib ]; then
            echo "Cannot find ORT macOS runtime library"
            exit 1
          fi
          cp ort_pkg/runtimes/osx-arm64/native/libonnxruntime.dylib "${ORT_GENAI_PATH}/lib/"

      - name: Download webview.h
        run: |
          curl -sL -o include/webview/webview.h https://raw.githubusercontent.com/nicedoc/webview/0.12.0/core/include/webview/webview.h || true

      - name: Download webview.h (fallback)
        shell: pwsh
        run: |
          if ((Get-Item include/webview/webview.h -ErrorAction SilentlyContinue).Length -lt 1000) {
            Invoke-WebRequest -Uri "https://github.com/webview/webview/archive/refs/tags/0.12.0.zip" -OutFile webview_tmp.zip
            Expand-Archive webview_tmp.zip -DestinationPath webview_ext -Force
            $wvh = Get-ChildItem webview_ext -Recurse -Filter "webview.h" | Sort-Object Length -Descending | Select-Object -First 1
            Copy-Item $wvh.FullName include/webview/webview.h -Force
            Remove-Item webview_tmp.zip, webview_ext -Recurse -Force
          }
          Write-Host "webview.h size: $((Get-Item include/webview/webview.h).Length) bytes"

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DORT_GENAI_PATH=${{ env.ORT_GENAI_PATH }} \
            -DLLAMA_CPP_PATH=${{ env.LLAMA_CPP_PATH }} \
            -DEDGESCRIBE_ENABLE_GUI=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install espeak-ng
        run: |
          brew install espeak-ng

      - name: Package
        run: |
          OUT_DIR="openscribe-osx-arm64"
          mkdir -p "$OUT_DIR"
          cp build/edgescribe "$OUT_DIR/"
          cp build/*.dylib "$OUT_DIR/" 2>/dev/null || true
          cp build/*.so* "$OUT_DIR/" 2>/dev/null || true
          cp -r www "$OUT_DIR/www"
          cp README.md "$OUT_DIR/"
          cp LICENSE "$OUT_DIR/"
          # Bundle espeak-ng library + data for TTS phonemizer
          ESPEAK_LIB=$(brew --prefix espeak-ng 2>/dev/null)/lib/libespeak-ng.dylib
          ESPEAK_DATA=$(brew --prefix espeak-ng 2>/dev/null)/share/espeak-ng-data
          if [ -f "$ESPEAK_LIB" ]; then
            cp "$ESPEAK_LIB" "$OUT_DIR/"
          fi
          if [ -d "$ESPEAK_DATA" ]; then
            cp -r "$ESPEAK_DATA" "$OUT_DIR/espeak-ng-data"
          fi
          tar czf "openscribe-osx-arm64.tar.gz" "$OUT_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openscribe-osx-arm64
          path: openscribe-osx-arm64.tar.gz
