name: Build macOS

on:
  workflow_call:
    inputs:
      llama_cpp_version:
        required: false
        type: string
        default: "master"

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download miniaudio.h
        run: |
          curl -sL -o include/miniaudio.h https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h

      - name: Clone llama.cpp
        run: |
          git clone --depth 1 --branch ${{ inputs.llama_cpp_version }} https://github.com/ggml-org/llama.cpp.git llama_cpp_src

      - name: Build llama.cpp
        run: |
          cd llama_cpp_src
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DGGML_VULKAN=OFF \
            -DGGML_METAL=ON \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_TOOLS=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF
          cmake --build build --config Release --parallel
          echo "LLAMA_CPP_PATH=${{ github.workspace }}/llama_cpp_src" >> $GITHUB_ENV

      - name: Build onnxruntime-genai (source)
        run: |
          pip3 install requests --break-system-packages || pip3 install requests
          git clone --depth 1 https://github.com/microsoft/onnxruntime-genai.git genai_src
          cd genai_src
          python3 build.py --config Release --parallel --skip_tests --skip_examples --skip_wheel --cmake_extra_defines CMAKE_OSX_ARCHITECTURES=arm64
          echo "ORT_GENAI_PATH=${{ github.workspace }}/genai_src" >> $GITHUB_ENV

      - name: Download webview.h
        run: |
          curl -sL -o include/webview/webview.h https://raw.githubusercontent.com/nicedoc/webview/0.12.0/core/include/webview/webview.h || true

      - name: Download webview.h (fallback)
        shell: pwsh
        run: |
          if ((Get-Item include/webview/webview.h -ErrorAction SilentlyContinue).Length -lt 1000) {
            Invoke-WebRequest -Uri "https://github.com/webview/webview/archive/refs/tags/0.12.0.zip" -OutFile webview_tmp.zip
            Expand-Archive webview_tmp.zip -DestinationPath webview_ext -Force
            $wvh = Get-ChildItem webview_ext -Recurse -Filter "webview.h" | Sort-Object Length -Descending | Select-Object -First 1
            Copy-Item $wvh.FullName include/webview/webview.h -Force
            Remove-Item webview_tmp.zip, webview_ext -Recurse -Force
          }
          Write-Host "webview.h size: $((Get-Item include/webview/webview.h).Length) bytes"

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DORT_GENAI_PATH=${{ env.ORT_GENAI_PATH }} \
            -DLLAMA_CPP_PATH=${{ env.LLAMA_CPP_PATH }} \
            -DEDGESCRIBE_ENABLE_GUI=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install espeak-ng
        run: |
          brew install espeak-ng

      - name: Package
        run: |
          OUT_DIR="openscribe-osx-arm64"
          mkdir -p "$OUT_DIR"
          cp build/edgescribe "$OUT_DIR/"
          cp build/*.dylib "$OUT_DIR/" 2>/dev/null || true
          cp build/*.so* "$OUT_DIR/" 2>/dev/null || true
          cp -r www "$OUT_DIR/www"
          cp README.md "$OUT_DIR/"
          cp LICENSE "$OUT_DIR/"
          # Bundle espeak-ng library + data for TTS phonemizer
          ESPEAK_LIB=$(brew --prefix espeak-ng 2>/dev/null)/lib/libespeak-ng.dylib
          ESPEAK_DATA=$(brew --prefix espeak-ng 2>/dev/null)/share/espeak-ng-data
          if [ -f "$ESPEAK_LIB" ]; then
            cp "$ESPEAK_LIB" "$OUT_DIR/"
          fi
          if [ -d "$ESPEAK_DATA" ]; then
            cp -r "$ESPEAK_DATA" "$OUT_DIR/espeak-ng-data"
          fi
          tar czf "openscribe-osx-arm64.tar.gz" "$OUT_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openscribe-osx-arm64
          path: openscribe-osx-arm64.tar.gz
