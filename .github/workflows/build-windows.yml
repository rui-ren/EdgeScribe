name: Build Windows

on:
  workflow_call:
    inputs:
      llama_cpp_version:
        required: false
        type: string
        default: "master"
      genai_version:
        required: false
        type: string
        default: "0.12.2"
      ort_version:
        required: false
        type: string
        default: "1.25.0-dev-20260125-1205-727db0d3dc"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download miniaudio.h
        run: |
          curl -sL -o include/miniaudio.h https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h

      - name: Clone llama.cpp
        run: |
          git clone --depth 1 --branch ${{ inputs.llama_cpp_version }} https://github.com/ggml-org/llama.cpp.git llama_cpp_src

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan-sdk.exe
          Start-Process -FilePath .\vulkan-sdk.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          echo "VULKAN_SDK=$($sdkPath.FullName)" >> $env:GITHUB_ENV

      - name: Build llama.cpp
        shell: pwsh
        run: |
          cd llama_cpp_src
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DGGML_VULKAN=ON `
            -DLLAMA_CURL=OFF `
            -DLLAMA_BUILD_TOOLS=ON `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_EXAMPLES=OFF `
            -DLLAMA_BUILD_SERVER=OFF
          cmake --build build --config Release --parallel
          echo "LLAMA_CPP_PATH=${{ github.workspace }}/llama_cpp_src" >> $env:GITHUB_ENV

      - name: Download onnxruntime-genai (prebuilt)
        shell: pwsh
        run: |
          $version = "${{ inputs.genai_version }}"
          $url = "https://github.com/microsoft/onnxruntime-genai/releases/download/v$version/onnxruntime-genai-$version-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile genai.zip
          Expand-Archive genai.zip -DestinationPath genai_extracted -Force
          Remove-Item genai.zip -Force

          $candidates = @(
            (Join-Path $pwd "genai_extracted")
          ) + (Get-ChildItem genai_extracted -Directory | ForEach-Object { $_.FullName })

          $genaiRoot = $candidates | Where-Object {
            (Test-Path (Join-Path $_ "include")) -and (Test-Path (Join-Path $_ "lib"))
          } | Select-Object -First 1

          if (-not $genaiRoot) {
            throw "Could not locate onnxruntime-genai root in genai_extracted"
          }

          echo "ORT_GENAI_PATH=$genaiRoot" >> $env:GITHUB_ENV

      - name: Download ONNX Runtime (matching)
        shell: pwsh
        run: |
          $ortVersion = "${{ inputs.ort_version }}"
          $ortUrl = "https://pkgs.dev.azure.com/aiinfra/2692857e-05ef-43b4-ba9c-ccf1c22c437c/_apis/packaging/feeds/7982ae20-ed19-4a35-a362-a96ac99897b7/nuget/packages/Microsoft.ML.OnnxRuntime/versions/$ortVersion/content?api-version=6.0-preview.1"
          Invoke-WebRequest -Uri $ortUrl -OutFile ort.nupkg
          Expand-Archive ort.nupkg -DestinationPath ort_pkg -Force
          Remove-Item ort.nupkg -Force

          $genaiRoot = $env:ORT_GENAI_PATH
          if (-not $genaiRoot) {
            throw "ORT_GENAI_PATH is not set"
          }

          $ortInclude = Join-Path $pwd "ort_pkg\\build\\native\\include"
          if (-not (Test-Path $ortInclude)) {
            throw "Cannot find ORT include directory at $ortInclude"
          }
          Copy-Item -Path (Join-Path $ortInclude "*") -Destination (Join-Path $genaiRoot "include") -Recurse -Force

          $ortRuntimeDir = Join-Path $pwd "ort_pkg\\runtimes\\win-x64\\native"
          if (-not (Test-Path $ortRuntimeDir)) {
            throw "Cannot find ORT runtime directory at $ortRuntimeDir"
          }
          Copy-Item -Path (Join-Path $ortRuntimeDir "*") -Destination (Join-Path $genaiRoot "lib") -Recurse -Force

      - name: Download webview.h
        run: |
          curl -sL -o include/webview/webview.h https://raw.githubusercontent.com/nicedoc/webview/0.12.0/core/include/webview/webview.h || true

      - name: Download webview.h (fallback)
        shell: pwsh
        run: |
          if ((Get-Item include/webview/webview.h -ErrorAction SilentlyContinue).Length -lt 1000) {
            Invoke-WebRequest -Uri "https://github.com/webview/webview/archive/refs/tags/0.12.0.zip" -OutFile webview_tmp.zip
            Expand-Archive webview_tmp.zip -DestinationPath webview_ext -Force
            $wvh = Get-ChildItem webview_ext -Recurse -Filter "webview.h" | Sort-Object Length -Descending | Select-Object -First 1
            Copy-Item $wvh.FullName include/webview/webview.h -Force
            Remove-Item webview_tmp.zip, webview_ext -Recurse -Force
          }
          Write-Host "webview.h size: $((Get-Item include/webview/webview.h).Length) bytes"

      - name: Download WebView2 SDK
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory deps -Source https://api.nuget.org/v3/index.json
          $wv2 = Get-ChildItem deps -Directory -Filter "Microsoft.Web.WebView2*" | Select-Object -First 1
          echo "WEBVIEW2_PATH=$($wv2.FullName)" >> $env:GITHUB_ENV

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DORT_GENAI_PATH="$env:ORT_GENAI_PATH" `
            -DLLAMA_CPP_PATH="$env:LLAMA_CPP_PATH" `
            -DEDGESCRIBE_ENABLE_GUI=ON `
            -DWEBVIEW2_PATH="$env:WEBVIEW2_PATH"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install espeak-ng
        shell: pwsh
        run: |
          choco install espeak-ng -y --no-progress

      - name: Package
        shell: pwsh
        run: |
          $outDir = "openscribe-win-x64"
          New-Item -ItemType Directory -Path $outDir -Force
          Copy-Item build/Release/edgescribe.exe $outDir/
          Copy-Item build/Release/*.dll $outDir/ -ErrorAction SilentlyContinue
          Copy-Item -Recurse www $outDir/www
          Copy-Item README.md $outDir/
          Copy-Item LICENSE $outDir/
          # Bundle espeak-ng DLL + data for TTS phonemizer
          $espeakDir = "C:\Program Files\eSpeak NG"
          if (Test-Path $espeakDir) {
            Copy-Item "$espeakDir\libespeak-ng.dll" $outDir/
            Copy-Item -Recurse "$espeakDir\espeak-ng-data" "$outDir\espeak-ng-data"
          }
          # Bundle VC++ redistributable for users without Visual C++ runtime
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "$outDir/vc_redist_x64.exe" -UseBasicParsing
          Compress-Archive -Path $outDir -DestinationPath "openscribe-win-x64.zip"

      - name: Build Installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\openscribe.iss
          Move-Item installer\windows\Output\OpenScribeSetup.exe OpenScribeSetup.exe

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: OpenScribeSetup
          path: OpenScribeSetup.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openscribe-win-x64
          path: openscribe-win-x64.zip
