name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  GENAI_VERSION: "0.12.0"
  LLAMA_CPP_VERSION: "b5200"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: zip
            llama_vulkan: "ON"
            llama_metal: "OFF"
          - os: macos-14
            rid: osx-arm64
            ext: tar.gz
            llama_vulkan: "OFF"
            llama_metal: "ON"

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.rid }})

    steps:
      - uses: actions/checkout@v4

      - name: Download miniaudio.h
        run: |
          curl -sL -o include/miniaudio.h https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h

      # ── Build llama.cpp from source ──────────────────────────────────────
      - name: Clone llama.cpp
        run: |
          git clone --depth 1 --branch ${{ env.LLAMA_CPP_VERSION }} https://github.com/ggerganov/llama.cpp.git llama_cpp_src

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows' && matrix.llama_vulkan == 'ON'
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan-sdk.exe
          Start-Process -FilePath .\vulkan-sdk.exe -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          $sdkPath = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          echo "VULKAN_SDK=$($sdkPath.FullName)" >> $env:GITHUB_ENV

      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux' && matrix.llama_vulkan == 'ON'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: Build llama.cpp (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd llama_cpp_src
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DGGML_VULKAN=${{ matrix.llama_vulkan }} `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_EXAMPLES=OFF `
            -DLLAMA_BUILD_SERVER=OFF
          cmake --build build --config Release
          cmake --install build --prefix ./install --config Release
          echo "LLAMA_CPP_PATH=${{ github.workspace }}/llama_cpp_src/install" >> $env:GITHUB_ENV

      - name: Build llama.cpp (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cd llama_cpp_src
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DGGML_VULKAN=${{ matrix.llama_vulkan }} \
            -DGGML_METAL=${{ matrix.llama_metal }} \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF
          cmake --build build --config Release
          cmake --install build --prefix ./install
          echo "LLAMA_CPP_PATH=${{ github.workspace }}/llama_cpp_src/install" >> $GITHUB_ENV

      # ── Download onnxruntime-genai (for ASR + TTS) ──────────────────────
      - name: Download onnxruntime-genai (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ env.GENAI_VERSION }}"
          $url = "https://github.com/microsoft/onnxruntime-genai/releases/download/v${version}/onnxruntime-genai-${version}-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile genai.zip
          Expand-Archive genai.zip -DestinationPath genai_extracted
          # Find the lib and include directories
          $genaiDir = Get-ChildItem -Path genai_extracted -Recurse -Directory | Where-Object { Test-Path (Join-Path $_.FullName "include") } | Select-Object -First 1
          if ($genaiDir) {
            $env:ORT_GENAI_PATH = $genaiDir.FullName
          } else {
            $env:ORT_GENAI_PATH = "genai_extracted"
          }
          echo "ORT_GENAI_PATH=$env:ORT_GENAI_PATH" >> $env:GITHUB_ENV

      - name: Download onnxruntime-genai (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ env.GENAI_VERSION }}"
          RID="${{ matrix.rid }}"
          URL="https://github.com/microsoft/onnxruntime-genai/releases/download/v${VERSION}/onnxruntime-genai-${VERSION}-${RID}.tar.gz"
          mkdir -p genai_extracted
          curl -sL "$URL" | tar xz -C genai_extracted
          GENAI_DIR=$(find genai_extracted -name "include" -type d | head -1 | xargs dirname)
          if [ -z "$GENAI_DIR" ]; then
            GENAI_DIR="genai_extracted"
          fi
          echo "ORT_GENAI_PATH=$GENAI_DIR" >> $GITHUB_ENV

      # ── Configure and build EDGESCRIBE ──────────────────────────────────
      - name: Configure CMake (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DORT_GENAI_PATH=${{ env.ORT_GENAI_PATH }} \
            -DLLAMA_CPP_PATH=${{ env.LLAMA_CPP_PATH }}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DORT_GENAI_PATH="$env:ORT_GENAI_PATH" `
            -DLLAMA_CPP_PATH="$env:LLAMA_CPP_PATH"

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $outDir = "openscribe-${{ matrix.rid }}"
          New-Item -ItemType Directory -Path $outDir -Force
          Copy-Item build/Release/openscribe.exe $outDir/
          Copy-Item build/Release/*.dll $outDir/ -ErrorAction SilentlyContinue
          Copy-Item README.md $outDir/
          Copy-Item LICENSE $outDir/
          Compress-Archive -Path $outDir -DestinationPath "openscribe-${{ matrix.rid }}.zip"

      - name: Build Installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install Inno Setup
          choco install innosetup -y --no-progress
          # Compile installer
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\openscribe.iss
          # Move output
          Move-Item installer\windows\Output\OpenScribeSetup.exe OpenScribeSetup.exe

      - name: Upload Installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: OpenScribeSetup
          path: OpenScribeSetup.exe

      - name: Package (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          OUT_DIR="openscribe-${{ matrix.rid }}"
          mkdir -p "$OUT_DIR"
          cp build/openscribe "$OUT_DIR/"
          cp build/*.dylib "$OUT_DIR/" 2>/dev/null || true
          cp build/*.so* "$OUT_DIR/" 2>/dev/null || true
          cp README.md "$OUT_DIR/"
          cp LICENSE "$OUT_DIR/"
          tar czf "openscribe-${{ matrix.rid }}.tar.gz" "$OUT_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openscribe-${{ matrix.rid }}
          path: openscribe-${{ matrix.rid }}.${{ matrix.ext }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            OpenScribeSetup.exe
            openscribe-win-x64.zip
            openscribe-osx-arm64.tar.gz
