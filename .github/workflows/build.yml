name: Build

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Select which platform to build"
        required: true
        type: choice
        options:
          - windows
          - macos
          - both
        default: both

jobs:
  build-windows:
    if: ${{ inputs.target == 'windows' || inputs.target == 'both' }}
    uses: ./.github/workflows/build-windows.yml
    with:
      llama_cpp_version: "master"
    secrets: inherit

  build-macos:
    if: ${{ inputs.target == 'macos' || inputs.target == 'both' }}
    uses: ./.github/workflows/build-macos.yml
    with:
      llama_cpp_version: "master"
    secrets: inherit
