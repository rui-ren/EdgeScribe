name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-windows:
    uses: ./.github/workflows/build-windows.yml
    with:
      llama_cpp_version: "master"
    secrets: inherit

  build-macos:
    uses: ./.github/workflows/build-macos.yml
    with:
      llama_cpp_version: "master"
    secrets: inherit
